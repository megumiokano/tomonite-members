<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トモニテ — メンバー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FFFBF7;--surface:#fff;--ink:#2D2520;--mid:#7A6E68;--soft:#B8AFA9;--border:#EDE8E3}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans JP",sans-serif;font-weight:300;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,251,247,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-icon{width:32px;height:32px;border-radius:9px;background:#FF8C69;display:flex;align-items:center;justify-content:center;font-family:"Zen Maru Gothic",sans-serif;font-size:15px;font-weight:700;color:#fff}
.logo-text{font-family:"Zen Maru Gothic",sans-serif;font-size:14px;font-weight:700;color:var(--ink)}
.nav-label{font-size:11px;letter-spacing:.1em;color:var(--soft)}
.page-header{padding:32px 32px 20px;max-width:1120px;margin:0 auto}
.page-header h1{font-family:"Zen Maru Gothic",sans-serif;font-size:24px;font-weight:700;margin-bottom:6px}
.page-header p{font-size:13px;color:var(--mid);line-height:1.8}
.stats{max-width:1120px;margin:0 auto;padding:0 32px 18px;display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:5px 13px}
.stat-dot{width:7px;height:7px;border-radius:50%}
.stat-text{font-size:12px;font-weight:500;color:var(--ink)}
.stat-num{font-size:12px;color:var(--mid)}
.filter{max-width:1120px;margin:0 auto;padding:0 32px 22px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;letter-spacing:.1em;color:var(--soft);margin-right:4px}
.fb{font-family:"Noto Sans JP",sans-serif;font-size:11.5px;padding:6px 15px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;transition:all .18s;white-space:nowrap}
.fb:hover{border-color:#FF8C69;color:#FF8C69}
.fb.on{background:#FF8C69;border-color:#FF8C69;color:#fff;font-weight:500}
.grid{max-width:1120px;margin:0 auto;padding:0 32px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{background:var(--surface);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,0.09)}
.card.hidden{display:none}
.photo{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative}
.photo img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease;display:block}
.card:hover .photo img{transform:scale(1.05)}
.pos-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:500;letter-spacing:.04em;padding:3px 10px;border-radius:100px;background:#fff}
.card-body{padding:14px 16px 0;flex:1}
.card-name{font-family:"Zen Maru Gothic",sans-serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
.card-role{font-size:11px;color:var(--mid);line-height:1.5}
.card-footer{padding:11px 16px;margin-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.slack-btn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:#FF8C69;text-decoration:none;padding:5px 12px;border-radius:100px;border:1.5px solid #FFD4C8;background:#FFF2EE;transition:all .18s}
.slack-btn:hover{background:#FF8C69;color:#fff;border-color:#FF8C69}
.slack-btn svg{width:12px;height:12px;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .38s ease both}
@media(max-width:640px){nav,.page-header,.stats,.filter,.grid{padding-left:16px;padding-right:16px}.grid{grid-template-columns:repeat(2,1fr);gap:10px}}
</style>
</head>

  "クリエイター":"#D4A017","プロダクト":"#7B68EE","キャラクター":"#FF8C69"

const SLACK_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zM17.688 8.834a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zM15.165 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zM15.165 17.688a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/></svg>`;
const LINK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;

function buildStats(){
  const counts={};
  MEMBERS.forEach(m=>counts[m.pos]=(counts[m.pos]||0)+1);
  document.getElementById("statsArea").innerHTML=
    `<div class="stat-pill"><span class="stat-dot" style="background:#B8AFA9"></span><span class="stat-text">全員</span><span class="stat-num">${MEMBERS.length}名</span></div>`
    +Object.entries(counts).map(([p,n])=>
      `<div class="stat-pill"><span class="stat-dot" style="background:${POS_COLORS[p]||"#aaa"}"></span><span class="stat-text">${p}</span><span class="stat-num">${n}名</span></div>`
    ).join("");
}
function buildFilters(){
  const pos=[...new Set(MEMBERS.map(m=>m.pos))];
  const area=document.getElementById("filterArea");
  pos.forEach(p=>{
    const btn=document.createElement("button");
    btn.className="fb";btn.dataset.pos=p;btn.textContent=p;
    area.appendChild(btn);
  });
}
function buildCards(){
  const grid=document.getElementById("grid");
  MEMBERS.forEach((m,i)=>{
    const c=POS_COLORS[m.pos]||"#aaa";
    const btnLabel = m.isExternal ? "プロフィールはこちら" : "Slackで話す";
    const btnIcon = m.isExternal ? LINK_ICON : SLACK_ICON;
    const card=document.createElement("div");
    card.className="card";card.dataset.pos=m.pos;
    card.style.animationDelay=`${i*0.04}s`;
    card.innerHTML=`
      <div class="photo">
        <img src="${m.img}" alt="${m.name}" loading="lazy">
        <span class="pos-badge" style="color:${c};border:1.5px solid ${c}">${m.pos}</span>
      </div>
      <div class="card-body">
        <p class="card-name">${m.name}</p>
        <p class="card-role">${m.role}</p>
      </div>
      <div class="card-footer">
        <a href="${m.slack}" class="slack-btn" target="_blank">
          ${btnIcon}${btnLabel}
        </a>
      </div>`;
    grid.appendChild(card);
  });
}
document.getElementById("filterArea").addEventListener("click",e=>{
  const btn=e.target.closest(".fb");
  if(!btn)return;
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const pos=btn.dataset.pos;
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.toggle("hidden",pos!=="all"&&c.dataset.pos!==pos);
  });
});
buildStats();buildFilters();buildCards();
</script>
